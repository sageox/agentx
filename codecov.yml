codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true

flags:
  agentx:
    paths:
      - ./
    carryforward: true
